# 中医临床智能诊疗助手 - 配置文件

# 模型配置
llm:
  provider: "dashscope"          # dashscope / openai / deepseek
  model: "qwen-max"              # 大模型名称
  temperature: 0.1
  max_tokens: 2048

embedding:
  provider: "dashscope"
  model: "text-embedding-v2"     # DashScope Embedding 模型
  dimensions: 1536

# 向量库配置
vector_store:
  persist_dir: "./docs_emb"      # 向量索引持久化目录
  index_name: "tcm_index"

# 文档处理配置
document:
  data_dir: "./data"             # 原始文档目录
  chunk_size: 256                # 分块大小（字符数，与原版一致）
  chunk_overlap: 50              # 分块重叠
  supported_ext: [".txt"]        # 只支持 .txt（与原版一致）

# 检索配置
retrieval:
  similarity_top_k: 3            # 检索返回 Top-K
  similarity_cutoff: 0.65        # 相似度过滤阈值

# Web UI 配置
webui:
  host: "0.0.0.0"
  port: 8501
  debug: true
